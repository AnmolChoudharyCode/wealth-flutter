    {
      id: "user1_id",
      username: "Alice",
      email: "alice@example.com",
      createdAt: "2023-01-01T10:00:00Z"
    },
    {
      id: "user2_id",
      username: "Bob",
      email: "bob@example.com",
      createdAt: "2023-01-02T11:00:00Z"
    }
  ])
